name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        working-directory: foodiesapi
        run: ./mvnw test --no-transfer-progress
        env:
          JWT_SECRET: ci-test-secret-key-at-least-64-characters-long-for-hmac-sha256
          AWS_ACCESS_KEY: test-key
          AWS_SECRET_KEY: test-secret
          AWS_REGION: ap-south-1
          AWS_BUCKET_NAME: test-bucket
          RAZORPAY_KEY: rzp_test_placeholder
          RAZORPAY_SECRET: test-razorpay-secret

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: foodiesapi/target/surefire-reports/

  frontend-build:
    name: Frontend — Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: foodies/package-lock.json

      - name: Install dependencies
        working-directory: foodies
        run: npm ci

      - name: Build storefront
        working-directory: foodies
        run: npm run build
        env:
          VITE_API_URL: https://biterush-api-5x4q.onrender.com
